# Docker Compose para Jenkins + sysfoo1
# Este archivo orquestará tanto tu aplicación sysfoo1 como la base de datos PostgreSQL, 
# inyectando el perfil prod que definimos.

services:
  db:
    image: postgres:15-alpine
    container_name: sysfoo-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=yourpassword
      - POSTGRES_DB=sysfoodb  # <--- Esto soluciona tu error de "database does not exist"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: sysfoo-app
    depends_on:
      - db
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/sysfoodb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=yourpassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 512M
volumes:
  postgres_data: