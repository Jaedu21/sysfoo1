# Docker Compose para Jenkins + sysfoo1
# Versión simplificada - Solo Jenkins Master (sin agente)

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins-master
    restart: unless-stopped
    privileged: true
    user: root
    ports:
      - "8080:8080"      # Puerto web de Jenkins
      - "50000:50000"    # Puerto para agentes (reservado para futuro)
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true -Xmx2048m -Xms1024m
      - TZ=America/Bogota
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./jenkins_config:/var/jenkins_config:ro
    networks:
      - jenkins-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  jenkins_home:
    driver: local

networks:
  jenkins-network:
    driver: bridge
