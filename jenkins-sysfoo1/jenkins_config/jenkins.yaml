# jenkins.yaml - Configuration as Code para sysfoo1
# Coloca este archivo en: jenkins_config/jenkins.yaml

jenkins:
  systemMessage: "Jenkins configurado para el proyecto sysfoo1"
  numExecutors: 2
  mode: NORMAL
  
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD:-admin123}"
          
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  # Configuración de ubicación
  location:
    url: "http://localhost:8080/"
    adminAddress: "admin@ejemplo.com"

  # Configuración de Git
  scm:
    git:
      globalConfigName: "Jenkins"
      globalConfigEmail: "jenkins@ejemplo.com"

# Configuración de herramientas
tool:
  git:
    installations:
      - name: "Default"
        home: "git"
        
  maven:
    installations:
      - name: "Maven-3.9.6"
        properties:
          - installSource:
              installers:
                - maven:
                    id: "3.9.6"
        # O si prefieres la instalación manual del Dockerfile:
        # home: "/opt/maven"
        
  jdk:
    installations:
      - name: "JDK-17"
        home: "/opt/java/openjdk"
        properties:
          - installSource:
              installers: []

# Credenciales (usar variables de entorno para valores sensibles)
credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "github-credentials"
              username: "${GITHUB_USERNAME}"
              password: "${GITHUB_TOKEN}"
              description: "GitHub credentials para sysfoo1"

# Jobs/Pipelines
jobs:
  - script: >
      pipelineJob('sysfoo1-pipeline') {
        description('Pipeline para el proyecto sysfoo1')
        
        parameters {
          choiceParam('BRANCH', ['main', 'master', 'develop'], 'Rama a construir')
          choiceParam('ENVIRONMENT', ['development', 'staging', 'production'], 'Ambiente')
          booleanParam('SKIP_TESTS', false, 'Saltar tests')
          booleanParam('BUILD_DOCKER', true, 'Construir imagen Docker')
        }
        
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/Jaedu21/sysfoo1.git')
                  credentials('github-credentials')
                }
                branch('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
        
        triggers {
          pollSCM('H/5 * * * *')
        }
      }
